<!DOCTYPE html>
<html>
<head>
    <title>HK Hospital - Dr. MD Rahen Faraz</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            padding: 50px; 
            background: linear-gradient(45deg, #007bff, #28a745, #007bff); 
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white; 
            min-height: 100vh;
            margin: 0;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .welcome { 
            font-size: 3.5em; 
            margin: 20px 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: wave 2s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        .doctor-name { 
            background: rgba(255,255,255,0.2); 
            padding: 25px; 
            border-radius: 15px; 
            margin: 30px auto; 
            font-size: 2.2em; 
            max-width: 600px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .status { 
            font-size: 1.8em; 
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .hands {
            font-size: 4em;
            margin: 20px 0;
            animation: waveHands 3s ease-in-out infinite;
        }
        @keyframes waveHands {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }
        .live-badge {
            background: #28a745;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin: 20px;
            box-shadow: 0 5px 15px rgba(40,167,69,0.4);
        }
    </style>
</head>
<body>
    <div class="hands">👋</div>
    
    <h1 style="font-size: 2.5em; margin-bottom: 10px;">Welcome to</h1>
    <div class="doctor-name">
        Dr. MD Rahen Faraz
    </div>
    
    <div class="status">HK Hospital</div>
    <div class="live-badge">LIVE NOW</div>

</body>
</html>
